<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AJAX</title>
<script type="text/javascript">
	var testvar;
	function loadXMLDoc(file) {
		var xmlhttp;
		if (window.XMLHttpRequest) {// code for IE7+, Firefox, Chrome, Opera, Safari
			xmlhttp = new XMLHttpRequest();
		} else {// code for IE6, IE5
			xmlhttp = new ActiveXObject("Microsoft.XMLHTTP");
		}
		var tmp=0;
		xmlhttp.onreadystatechange = function() {
			if (xmlhttp.readyState == 4 && xmlhttp.status == 200) {
				document.getElementById("myDiv").innerHTML = xmlhttp.responseText;
				testvar=xmlhttp.responseText;
			}
		}
		xmlhttp.open("GET", file, true);
		xmlhttp.send();
	}
</script>
</head>
<body>

	<div id="myDiv">
		<h2>Let AJAX change this text</h2>
	</div>
	<button type="button" onclick="loadXMLDoc('test.html')">通过 AJAX 载入html文件改变内容</button>
	<br>
	<button type="button" onclick="loadXMLDoc('test.txt')">通过 AJAX 载入txt文件改变内容</button>
	<br>
	<button type="button" onclick="loadXMLDoc('test')">通过 AJAX 载入其它类型文件改变内容</button>
	
</body>
</html>
